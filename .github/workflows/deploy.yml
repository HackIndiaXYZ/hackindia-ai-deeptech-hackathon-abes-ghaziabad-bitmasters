name: Deploy JDAlign

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Explicitly install fpdf if requirements.txt is missing it
          pip install fpdf

      - name: Run tests
        run: |
          python -c "from app import app; print('App imports OK')"

  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: "srv-d81pdereo5us73afkbbg"
          api-key: "rnd_mxE08ckiUIVl7xvsvWivcArPLeeq"
